<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Learning Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 AI Learning Hub</h1>

<div class="nav">
  <button onclick="show('study')">Study</button>
  <button onclick="show('solve')">Solve</button>
  <button onclick="show('practice')">Practice</button>
  <button onclick="show('quiz')">Quiz</button>
  <button onclick="show('progress')">Progress</button>
</div>

<!-- STUDY -->
<div id="study" class="section">
  <h2>AI Study Assistant</h2>
  <textarea id="studyInput" placeholder="Ask a topic..."></textarea>
  <button onclick="fakeAI('studyInput','studyOut')">Explain</button>
  <div id="studyOut"></div>
</div>

<!-- SOLVE -->
<div id="solve" class="section hidden">
  <h2>AI Solver</h2>
  <textarea id="solveInput" placeholder="Enter math question"></textarea>
  <button onclick="fakeAI('solveInput','solveOut')">Solve</button>
  <div id="solveOut"></div>
</div>

<!-- PRACTICE -->
<div id="practice" class="section hidden">
  <h2>Practice Questions</h2>
  <div id="practiceBox"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="section hidden">
  <h2>Quiz</h2>
  <div id="quizBox"></div>
  <button onclick="checkQuiz()">Submit</button>
  <h3 id="score"></h3>
</div>

<!-- PROGRESS -->
<div id="progress" class="section hidden">
  <h2>Progress</h2>
  <p id="progressText">0 tasks completed</p>
</div>

<script src="script.js"></script>
</body>
</html>

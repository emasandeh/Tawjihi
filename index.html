<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AI Math Solver</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>AI Math Solver</h1>

  <p class="subtitle">
    Paste your math question and get an instant solution.
  </p>

  <textarea
    id="question"
    placeholder="Example: Solve x² + 5x + 6 = 0">
  </textarea>

  <button onclick="solveMath()">
    Solve Question
  </button>

  <div id="loading" class="loading hidden">
    Solving...
  </div>

  <div id="answer" class="answer"></div>

</div>

<script src="script.js"></script>

</body>
</html>

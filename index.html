<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>توجيهي AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🧠 توجيهي AI - مساعدك الذكي</h1>

  <p class="sub">اشرح، حل، وتعلم بطريقة بسيطة وسريعة</p>

  <textarea id="input" placeholder="اكتب سؤالك هنا..."></textarea>

  <button onclick="solve()">🚀 حل / شرح</button>

  <div id="output"></div>

  <hr>

  <h2>📚 أسئلة تدريب</h2>

  <div class="card">
    <p>حل: x² + 5x + 6 = 0</p>
    <button onclick="fill('حل: x² + 5x + 6 = 0')">جرّب مع AI</button>
  </div>

  <div class="card">
    <p>بسط: 3/4 + 2/5</p>
    <button onclick="fill('بسط: 3/4 + 2/5')">جرّب مع AI</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
